<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>عيد اضحى مبارك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4116166010835045"
     crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 8px;
            color: #fff;
            position: relative;
            overflow-x: hidden;
            /* تثبيت الخلفية الخضراء هنا وإلغاء الخلفيات الأخرى */
            background: linear-gradient(145deg, #1e4a3a, #2e8b57);
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; box-shadow: 0 0 10px white; animation: twinkle 3s infinite ease-in-out; }
        @keyframes twinkle { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        .moon { position: fixed; bottom: 30px; right: 20px; width: 120px; height: 120px; background: transparent; border-radius: 50%; box-shadow: -25px 12px 0 0 rgba(255, 215, 0, 0.6); transform: rotate(45deg); z-index: 0; animation: floatMoon 8s infinite alternate; filter: drop-shadow(0 0 20px gold); }
        @keyframes floatMoon { 0% { transform: rotate(45deg) translateY(0); } 100% { transform: rotate(45deg) translateY(-20px); } }
        .lantern-top-left { position: fixed;top: 20px; left: 10px; font-size: 2.5rem; color: #ffd966; z-index: 999; animation: swingLeft 2.5s infinite alternate-reverse; filter: drop-shadow(0 0 8px orange); }
        @keyframes swingLeft { 0% { transform: translateX(0) rotate(0deg); } 100% { transform: translateX(-10px) rotate(-5deg); } }
        
        .sound-control { position: fixed; top: 6px; right: 16px; display: flex; align-items: center; gap: 10px; z-index: 20; }
        #soundToggle { background: rgba(0,0,0,0.3); border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #ffd966; transition: 0.2s; font-size: 1.2rem; backdrop-filter: blur(4px); }
        #soundToggle:hover { background: #ffd966; color: #0b2a35; }
        .sound-message { background: rgba(0,0,0,0.7); color: #ffd966; padding: 8px 15px; border-radius: 30px; font-size: 0.9rem; border: 1px solid #ffd966; backdrop-filter: blur(4px); white-space: nowrap; animation: fadeInOut 3s infinite; }
        @keyframes fadeInOut { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
        
        .container { max-width: 380px; width: 100%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border-radius: 30px; padding: 20px 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,215,0,0.3); position: relative; z-index: 1; margin-top: 22px; }
        .greeting-card { background: rgba(0,0,0,0.2); border-radius: 28px; padding: 16px 16px; margin-bottom: 20px; border: 2px solid #ffd966; text-align: center; animation: fadeInUp 0.8s ease-out forwards; }
        
        .names-list { 
            font-size: 1.6rem; 
            font-weight: bold; 
            color: #ffd966; 
            background: rgba(0,0,0,0.3); 
            padding: 8px 18px; 
            border-radius: 40px; 
            display: inline-block; 
            margin-bottom: 8px; 
            border: 1px solid #ffd966; 
            animation: colorChange 3s infinite, glow 2s infinite, fadeInUp 0.8s 0.2s both; 
        }
        
        h1 { 
            font-family: 'Amiri', serif; 
            font-size: 2rem; 
            color: #ffd966; 
            margin-bottom: 2px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            text-shadow: 0 0 10px #ffd966;
            animation: fadeInUp 0.8s 0.3s both;
        }
        
        h1 i { 
            color: #ffd966; 
            font-size: 1.8rem; 
            animation: starSpin 3s infinite ease-in-out, starColor 2s infinite; 
            display: inline-block;
        }
        
        @keyframes starSpin {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.2); }
            50% { transform: rotate(180deg) scale(1); }
            75% { transform: rotate(270deg) scale(0.9); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        h1 i:first-child { animation: starSpinReverse 3.5s infinite ease-in-out, starColor 2s infinite; }
        h1 i:last-child { animation: starSpin 4s infinite ease-in-out, starColor 2s infinite; }
        
        @keyframes starSpinReverse {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-90deg) scale(1.1); }
            50% { transform: rotate(-180deg) scale(0.9); }
            75% { transform: rotate(-270deg) scale(1.2); }
            100% { transform: rotate(-360deg) scale(1); }
        }
        
        @keyframes starColor {
            0% { color: #ffd966; text-shadow: 0 0 5px #ffd966; }
            33% { color: #ffaa00; text-shadow: 0 0 15px #ffaa00; }
            66% { color: #ffdd55; text-shadow: 0 0 10px #ffdd55; }
            100% { color: #ffd966; text-shadow: 0 0 5px #ffd966; }
        }

        h2 { 
            font-size: 1.3rem; 
            color: #ffe4b5; 
            margin-bottom: 12px; 
            animation: colorChange 3s infinite, fadeInUp 0.8s 0.4s both; 
        }
        
        .dua-text { 
            font-size: 1.4rem; 
            line-height: 1.7; 
            margin: 16px 0; 
            padding: 20px; 
            background: rgba(0,0,0,0.4); 
            border-radius: 35px; 
            font-family: 'Amiri', serif; 
            font-weight: 700; 
            border: 2px solid #ffd966; 
            box-shadow: 0 0 20px rgba(255,215,0,0.3); 
            color: #fff; 
            text-shadow: 1px 1px 2px black; 
            animation: fadeInUp 0.8s 0.5s both; 
        }
        
        .fixed-phrase { 
            font-size: 1rem; 
            color: #ffd966; 
            margin: 12px 0; 
            font-weight: bold; 
            background: rgba(255,255,255,0.05); 
            padding: 10px; 
            border-radius: 30px; 
            animation: fadeInUp 0.8s 0.6s both; 
        }
        
        .decor { 
            margin-top: 20px;
            animation: floatUpDown 3s infinite ease-in-out; 
        }
        
        .decor i { 
            color: #ffd966; 
            margin: 0 4px; 
            font-size: 1.2rem; 
            animation: starColor 2s infinite; 
        }
        
        @keyframes floatUpDown {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        @keyframes colorChange {
            0% { color: #ffe4b5; text-shadow: 0 0 5px rgba(255, 0, 0, 0.3); }
            25% { color: #ffb5b5; text-shadow: 0 0 5px rgba(0, 0, 255, 0.3); }
            50% { color: #b5ffb5; text-shadow: 0 0 5px rgba(0, 255, 0, 0.3); }
            75% { color: #b5b5ff; text-shadow: 0 0 5px rgba(255, 255, 0, 0.3); }
            100% { color: #ffe4b5; text-shadow: 0 0 5px rgba(255, 0, 0, 0.3); }
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px #ffd966; }
            50% { text-shadow: 0 0 20px #ffd966, 0 0 30px #ffaa00; }
            100% { text-shadow: 0 0 5px #ffd966; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="moon"></div>
    <div class="lantern-top-left">🐏</div>

    <audio id="eidSong" preload="auto" loop>
        <source src="WhatsApp Audio 2026-05-25 at 9.30.03 AM.mpeg" type="audio/mpeg">
    </audio>

    <div class="sound-control">
        <div id="soundToggle"><i class="fas fa-volume-mute" id="soundIcon"></i></div>
        <div class="sound-message" id="soundMessage">🔊 انقر لتشغيل الصوت</div>
    </div>

    <div class="container">
        <div class="greeting-card">
            <div class="names-list">عبدالله الخلايلة</div>
            <h1><i class="fas fa-star"></i>يهنئكم<i class="fas fa-star"></i></h1>
            <h2>بحلول عيد الأضحى المبارك</h2>
            <div class="dua-text">🕊️ تقبل الله منا ومنكم صالح الطاعات، وأعاد هذه الأيام المباركة عليكم باليمن والبركات، وملأ قلوبكم بالرضا والسكينة، وجعل عيدكم فرحةً دائمةً لا تنقضي.</div>
            <p class="fixed-phrase">عيد أضحى مبارك، كل سنة وأنتم بخير وعافية</p>
            <div class="decor">
                <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                <i class="fas">🕌</i>
                <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
            </div>
        </div>
    </div>

    <script>
// إنشاء النجوم الخلفية
function createStars() {
    const starsContainer = document.getElementById('stars');
    starsContainer.innerHTML = '';
    for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.top = Math.random() * 100 + '%';
        star.style.left = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.animationDuration = Math.random() * 3 + 2 + 's';
        starsContainer.appendChild(star);
    }
}
createStars();

// تشغيل تأثير الألعاب النارية الكونفيتي
function launchConfetti() {
    confetti({
        particleCount: 60,
        spread: 60,
        origin: { y: 0.6 },
        colors: ['#ffd966', '#ffaa00', '#ffdd55', '#ffffff']
    });
}
launchConfetti();
setInterval(launchConfetti, 4000);


// ==================== نظام تشغيل الصوت المطوّر ====================
const song = document.getElementById('eidSong');
song.volume = 0.7;

const soundIcon = document.getElementById('soundIcon');
const soundMessage = document.getElementById('soundMessage');
let soundEnabled = false;

// تحديث واجهة المستخدم للصوت
function updateSoundUI() {
    if (soundEnabled) {
        soundIcon.className = 'fas fa-volume-up';
        soundMessage.style.display = 'none';
    } else {
        soundIcon.className = 'fas fa-volume-mute';
        soundMessage.style.display = 'block';
    }
}

// دالة ذكية لتشغيل الصوت تلقائياً مع أي تفاعل للمستخدم
function triggerAudioOnInteraction() {
    if (!soundEnabled) {
        song.play().then(() => {
            soundEnabled = true;
            updateSoundUI();
            removeAllInteractionListeners(); // إلغاء المستمعات بعد النجاح لتوفير الأداء
        }).catch(err => {
            console.log("المتصفح يطلب تفاعلاً مباشراً أكثر لتشغيل الصوت.", err);
        });
    }
}

// التحكم اليدوي عند الضغط على زر الصوت العلوي
document.getElementById('soundToggle').addEventListener('click', (e) => {
    e.stopPropagation(); // منع تعارض الحدث مع أحداث الشاشة الأخرى
    soundEnabled = !soundEnabled;

    if (navigator.vibrate) {
        navigator.vibrate(100);
    }

    if (soundEnabled) {
        song.play().then(() => updateSoundUI()).catch(err => console.log(err));
    } else {
        song.pause();
        updateSoundUI();
    }
});

// إضافة مستمعات للأحداث على كامل الصفحة لضمان التشغيل فوراً عند أي تفاعل
function removeAllInteractionListeners() {
    document.removeEventListener('click', triggerAudioOnInteraction);
    document.removeEventListener('touchstart', triggerAudioOnInteraction);
    document.removeEventListener('pointerdown', triggerAudioOnInteraction);
    document.removeEventListener('scroll', triggerAudioOnInteraction);
}

document.addEventListener('click', triggerAudioOnInteraction);
document.addEventListener('touchstart', triggerAudioOnInteraction);
document.addEventListener('pointerdown', triggerAudioOnInteraction);
document.addEventListener('scroll', triggerAudioOnInteraction);

// محاولة التشغيل عند التحميل فوراً (تنجح في تطبيقات مثل واتساب وفيسبوك)
window.addEventListener('DOMContentLoaded', triggerAudioOnInteraction);
updateSoundUI();

    </script>
</body>
</html>
